name: Claude CI Fix

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed workflow run ID (from gh run list)'
        required: true
      branch:
        description: 'PR branch name (e.g., claude/SDK-123)'
        required: true

jobs:
  call-ci-fix:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        startsWith(github.event.workflow_run.head_branch, 'claude/')
      )
    # viamrobotics/claude-ci-workflows@v2.1.0
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-ci-fix.yml@97b61edeb3aebf3b9bfc93129ac9beae053e5aab
    with:
      run_id: ${{ github.event.workflow_run.id || inputs.run_id }}
      branch: ${{ github.event.workflow_run.head_branch || inputs.branch }}
      install_command: 'git clone https://github.com/flutter/flutter.git -b stable --depth 1 /opt/flutter && echo "/opt/flutter/bin" >> $GITHUB_PATH && /opt/flutter/bin/flutter pub get'
      allowed_tools: 'Edit,Read,Write,Glob,Grep,Bash(make format*),Bash(make analyze*),Bash(make test*),Bash(make build_mocks*),Bash(flutter *),Bash(dart *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git -C * diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *),Bash(gh api repos/*/pulls/*/comments*)'
      team_mention: '@viamrobotics/sdk'
      extra_prompt: |
        - Run `make format`, `make analyze`, and `make test` to verify your fix before committing. Fix any errors.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}
