name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: buildjet-2vcpu-ubuntu-2204

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get

      - name: Verify formatting
        run: make format

      - name: Analyze project source
        run: make analyze

      - name: Analyze examples
        run: |
          for d in example/*/; do
            echo "=== Analyzing $d ==="
            flutter pub get --directory="$d"
            dart analyze --no-fatal-warnings "$d/lib"
          done

      - name: Test examples
        run: |
          for d in example/*/; do
            if [ -d "$d/test" ]; then
              echo "=== Testing $d ==="
              cd "$d"
              flutter test
              cd -
            fi
          done

      - name: Run tests
        run: make test
